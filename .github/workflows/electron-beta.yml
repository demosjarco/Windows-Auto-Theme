name: Electron Beta Builder

on:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      increment:
        description: 'Increment type'
        required: true
        default: 'prepatch'
        type: choice
        options:
          - "major"
          - "minor"
          - "patch"
          - "premajor"
          - "preminor"
          - "prepatch"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3.1.1
        with:
          node-version: 'lts/*'
          check-latest: true
      - run: npm ci
      - name: Uninstall unneeded dependencies
        run: npm un electronmon less-watch-compiler
      - name: Delete dev files
        run: |
          rm -fv css/*.less
        shell: bash
      - run: npm run pack:win
      - name: Compress package x32
        run: Compress-Archive -Path '.\builds\packaged\windows-auto-theme-win32-ia32' -DestinationPath '.\windows-auto-theme-x32.zip' -CompressionLevel Optimal
        shell: powershell
      - name: Compress package x64
        run: Compress-Archive -Path '.\builds\packaged\windows-auto-theme-win32-x64' -DestinationPath '.\windows-auto-theme-x64.zip' -CompressionLevel Optimal
        shell: powershell
      - run: npm run inst:win
      - name: Increment version (from dropdown)
        run: npm version ${{ github.event.inputs.increment }}
        if: ${{ github.event.inputs.increment != '' }}
      - name: Increment version
        run: npm version prepatch
        if: ${{ github.event.inputs.increment == '' }}
      - run: cat package.json
        shell: bash
