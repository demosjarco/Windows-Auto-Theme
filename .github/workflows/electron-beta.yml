name: Electron Beta Builder

on:
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3.1.1
        with:
          node-version: 'lts/*'
          check-latest: true
      - run: npm ci
      - name: Uninstall unneeded dependencies
        run: npm un electronmon less-watch-compiler
      - name: Delete dev files
        run: |
          rm -fv css/*.less
        shell: bash
      - run: npm run pack:win
      - name: Compress package x32
        run: Compress-Archive -Path '.\builds\packaged\windows-auto-theme-win32-ia32' -DestinationPath '.\windows-auto-theme-x32.zip' -CompressionLevel Optimal
        shell: powershell
      - name: Compress package x64
        run: Compress-Archive -Path '.\builds\packaged\windows-auto-theme-win32-x64' -DestinationPath '.\windows-auto-theme-x64.zip' -CompressionLevel Optimal
        shell: powershell
      - run: npm run inst:win
      - name: GitHub Actions Create Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: "patch"
          pre_release_branches: "/^((?!master|main).)*$/"
          dry_run: true
      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            builds/installers/windows-auto-theme-installer-x32.exe
            builds/installers/windows-auto-theme-installer-x64.exe
            builds/installers/windows-auto-theme-installer-x32.msi
            builds/installers/windows-auto-theme-installer-x64.msi
            windows-auto-theme-x32.zip
            windows-auto-theme-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}