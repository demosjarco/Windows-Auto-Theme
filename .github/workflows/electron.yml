name: Electron Release Builder

on:
  push:
    tags:
      - 'v*.*.*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3.1.1
        with:
          node-version: 'lts/*'
          check-latest: true
      - run: npm ci
      - name: Uninstall unneeded dependencies
        run: npm un electronmon less-watch-compiler
      - name: Delete dev files
        run: |
          rm -fv css/*.less
        shell: bash
      - run: npm run pack:win
      - name: Compress package x32
        run: Compress-Archive -Path '.\builds\packaged\Windows Auto Theme-win32-ia32' -DestinationPath '.\windows-auto-theme-win-x32.zip' -CompressionLevel Optimal
        shell: powershell
      - name: Compress package x64
        run: Compress-Archive -Path '.\builds\packaged\Windows Auto Theme-win32-x64' -DestinationPath '.\windows-auto-theme-win-x64.zip' -CompressionLevel Optimal
        shell: powershell
      - run: npm run inst:win
      - name: Upload to Releases
        uses: softprops/action-gh-release@v1
        with:
          prerelease: false
          generate_release_notes: true
          files: |
            builds/installers/*.exe
            builds/installers/*.msi
            windows-auto-theme-win-x32.zip
            windows-auto-theme-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}